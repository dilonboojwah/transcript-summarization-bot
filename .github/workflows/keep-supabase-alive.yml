name: Keep Supabase Active

# Pings the Supabase project on a schedule so the free-tier project is not
# paused for inactivity. No app code is involved — this runs entirely on
# GitHub's servers.
#
# It also writes a small "heartbeat" commit about once a month. GitHub
# automatically disables scheduled workflows after 60 days of no repository
# activity; the heartbeat keeps the repo active so this workflow never gets
# turned off. Net result: fully hands-off, no third-party account needed.

on:
  schedule:
    # 12:00 UTC every Monday and Thursday (~3-4 day gap, well under the 7-day limit)
    - cron: "0 12 * * 1,4"
  workflow_dispatch: {} # lets you run it on demand from the Actions tab

# Needed so the heartbeat step can push a commit back to the repo.
permissions:
  contents: write

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ping Supabase REST API
        run: |
          # These two values are already public in the app's source
          # (src/utils/supabaseClient.ts), so embedding them here exposes
          # nothing new. The anon key is safe to expose — it is gated by
          # Supabase row-level security. The request itself is what keeps the
          # project marked as "active".
          SUPABASE_URL="https://akinruqvrdxpkmjpzdll.supabase.co"
          SUPABASE_ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFraW5ydXF2cmR4cGttanB6ZGxsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzM3NjE4MTAsImV4cCI6MjA0OTMzNzgxMH0.UQjWqCdYluBoCwmJs40DpdmuBWBS0pPwnht_wkzpPgs"

          # A plain "limit=1" query runs a real read against the Postgres
          # database (the strongest "this project is in use" signal) and
          # returns 200. We deliberately do NOT request a specific column so
          # the ping never breaks if the schema changes.
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            "$SUPABASE_URL/rest/v1/summaries?limit=1" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY")

          echo "Supabase responded with HTTP $status"

          # Any HTTP response means the project is awake and the request
          # counted as activity. Only a real network failure (no response at
          # all) should fail the job.
          if [ -z "$status" ] || [ "$status" = "000" ]; then
            echo "No response from Supabase — possible network/project error."
            exit 1
          fi

      - name: Heartbeat (keep this workflow from being auto-disabled)
        run: |
          HEARTBEAT_FILE=".github/last-keepalive.txt"

          # Read the timestamp stored in the heartbeat file. If it is younger
          # than 25 days we skip committing, so we never write more than ~1
          # heartbeat commit per month.
          now=$(date -u +%s)
          last_str=$(grep -oE '[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9:]{8}Z' "$HEARTBEAT_FILE" 2>/dev/null | head -1)
          last=$(date -u -d "$last_str" +%s 2>/dev/null || echo 0)
          age_days=$(( (now - last) / 86400 ))
          echo "Heartbeat is ${age_days} day(s) old."

          if [ "$age_days" -lt 25 ]; then
            echo "Recent enough — no heartbeat commit needed."
            exit 0
          fi

          date -u +"Last keep-alive heartbeat: %Y-%m-%dT%H:%M:%SZ" > "$HEARTBEAT_FILE"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$HEARTBEAT_FILE"
          git commit -m "chore: keep-alive heartbeat [skip ci]"
          git push
          echo "Wrote heartbeat commit to keep the schedule alive."
